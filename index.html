<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe Arcade</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-card">
        <p class="eyebrow">Browser Game</p>
        <h1>Tic-Tac-Toe</h1>
        <p class="subtitle">
          Play with another person or switch to an unbeatable computer opponent.
        </p>

        <div class="controls">
          <div class="mode-switch" role="group" aria-label="Choose game mode">
            <button class="mode-button is-active" data-mode="human" type="button">
              Two Players
            </button>
            <button class="mode-button" data-mode="computer" type="button">
              Vs Computer
            </button>
          </div>

          <div class="action-row">
            <button class="secondary-button" id="restart-button" type="button">
              New Round
            </button>
            <button class="secondary-button ghost" id="reset-score-button" type="button">
              Clear Score
            </button>
          </div>
        </div>

        <section class="scoreboard" aria-label="Scoreboard">
          <article class="score-tile">
            <span class="score-label">X Wins</span>
            <strong class="score-value" id="score-x">0</strong>
          </article>
          <article class="score-tile">
            <span class="score-label">Draws</span>
            <strong class="score-value" id="score-draw">0</strong>
          </article>
          <article class="score-tile">
            <span class="score-label">O Wins</span>
            <strong class="score-value" id="score-o">0</strong>
          </article>
        </section>

        <section class="arena">
          <div class="status-panel">
            <p class="status-label">Round Status</p>
            <p class="status-message" id="status-message">X starts the round.</p>
          </div>

          <div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe board">
            <button class="cell" data-cell-index="0" type="button" aria-label="Cell 1"></button>
            <button class="cell" data-cell-index="1" type="button" aria-label="Cell 2"></button>
            <button class="cell" data-cell-index="2" type="button" aria-label="Cell 3"></button>
            <button class="cell" data-cell-index="3" type="button" aria-label="Cell 4"></button>
            <button class="cell" data-cell-index="4" type="button" aria-label="Cell 5"></button>
            <button class="cell" data-cell-index="5" type="button" aria-label="Cell 6"></button>
            <button class="cell" data-cell-index="6" type="button" aria-label="Cell 7"></button>
            <button class="cell" data-cell-index="7" type="button" aria-label="Cell 8"></button>
            <button class="cell" data-cell-index="8" type="button" aria-label="Cell 9"></button>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
